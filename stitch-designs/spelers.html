<style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f0fdfa 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="text-on-surface antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl flex items-center justify-between px-6 py-4 w-full no-border shadow-[0_12px_40px_rgba(57,83,189,0.06)]">
<div class="flex items-center gap-4">
<button class="text-indigo-700 dark:text-indigo-400 active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-sans font-semibold text-lg tracking-tight text-indigo-700 dark:text-indigo-400">Rikken Score</h1>
</div>
<button class="text-indigo-700 dark:text-indigo-400 active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
</button>
</header>
<main class="pt-24 pb-32 px-6 max-w-[428px] mx-auto">
<!-- Search Bar Section -->
<div class="mb-10">
<div class="glass-card rounded-xl p-1 shadow-[0_12px_40px_rgba(57,83,189,0.06)] flex items-center gap-3 px-4">
<span class="material-symbols-outlined text-outline" data-icon="search">search</span>
<input class="bg-transparent border-none focus:ring-0 w-full py-3 text-body-lg text-on-surface placeholder:text-outline/60" placeholder="Zoek spelers..." type="text"/>
</div>
</div>
<!-- Leden Section -->
<section class="mb-12">
<div class="flex items-center justify-between mb-6 px-2">
<h2 class="text-title-md font-semibold tracking-tight text-on-surface-variant">Leden</h2>
<span class="text-label-md font-bold text-primary px-3 py-1 bg-primary/10 rounded-full">12 Totaal</span>
</div>
<div class="space-y-4">
<!-- Player Item -->
<div class="glass-card rounded-xl p-4 flex items-center justify-between shadow-[0_12px_40px_rgba(57,83,189,0.06)] border border-white/20 active:scale-[0.98] transition-all duration-200">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-gradient-to-br from-primary to-tertiary flex items-center justify-center text-white font-bold text-lg shadow-lg">
                            JD
                        </div>
<div>
<p class="font-semibold text-on-surface">Jasper de Vries</p>
<p class="text-xs text-outline font-medium uppercase tracking-wider">Premium Lid</p>
</div>
</div>
<div class="flex items-center gap-2">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="edit">edit</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-error-container/20 transition-colors text-error">
<span class="material-symbols-outlined text-[20px]" data-icon="delete">delete</span>
</button>
</div>
</div>
<!-- Player Item -->
<div class="glass-card rounded-xl p-4 flex items-center justify-between shadow-[0_12px_40px_rgba(57,83,189,0.06)] border border-white/20 active:scale-[0.98] transition-all duration-200">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full overflow-hidden border-2 border-white shadow-md">

</div>
<div>
<p class="font-semibold text-on-surface">Bram Meijer</p>
<p class="text-xs text-outline font-medium uppercase tracking-wider">Lid</p>
</div>
</div>
<div class="flex items-center gap-2">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="edit">edit</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-error-container/20 transition-colors text-error">
<span class="material-symbols-outlined text-[20px]" data-icon="delete">delete</span>
</button>
</div>
</div>
</div>
</section>
<!-- Gasten Section -->
<section class="mb-12">
<div class="flex items-center justify-between mb-6 px-2">
<h2 class="text-title-md font-semibold tracking-tight text-on-surface-variant">Gasten</h2>
</div>
<div class="space-y-4">
<!-- Guest Item -->
<div class="glass-card rounded-xl p-4 flex items-center justify-between shadow-[0_12px_40px_rgba(57,83,189,0.06)] border border-white/20 active:scale-[0.98] transition-all duration-200">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface-variant font-bold text-lg border border-outline-variant/30">
                            SV
                        </div>
<div>
<p class="font-semibold text-on-surface">Sander van Dijk</p>
<p class="text-xs text-outline font-medium uppercase tracking-wider italic">Tijdelijk</p>
</div>
</div>
<div class="flex items-center gap-2">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="edit">edit</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-error-container/20 transition-colors text-error">
<span class="material-symbols-outlined text-[20px]" data-icon="delete">delete</span>
</button>
</div>
</div>
</div>
</section>

<span class="material-symbols-outlined text-3xl" data-icon="add">add</span>
</button>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-slate-900/80 backdrop-blur-2xl rounded-t-xl z-50 no-border shadow-[0_-12px_40px_rgba(57,83,189,0.06)]">
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-6 py-2 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="leaderboard">leaderboard</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Scoreboard</span>
</a>
<a class="flex flex-col items-center justify-center bg-gradient-to-br from-[#3953bd] to-[#72489e] text-white rounded-2xl px-6 py-2 active:scale-[0.98] transition-all duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Settings</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-6 py-2 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="history">history</span>
<span class="text-[10px] font-bold uppercase tracking-widest">History</span>
</a>
</nav>
